name: Validar site

# Verifica links quebrados e caminhos de imagens/assets a cada push.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checar links e caminhos locais
        uses: lycheeverse/lychee-action@v2
        with:
          # Verifica âncoras/assets internos; ignora o host do GitHub Pages
          # (domínio próprio ainda não publicado). 404.html não entra: seu link
          # raiz absoluto (/Corretora-InHouse/) não resolve localmente sem domínio
          # próprio, e o lychee não consegue excluí-lo antes de tentar montar a URL.
          args: >-
            --no-progress
            --include-fragments
            --exclude "caiomsi\.github\.io"
            --exclude "wa\.me|facebook\.com|instagram\.com|google\.com"
            index.html
          fail: true
